<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greenhouse Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            leaf: {
              50:  '#f0faf2',
              100: '#d6f5dd',
              200: '#aeeabc',
              300: '#77d892',
              400: '#3ec063',
              500: '#1fa845',
              600: '#138535',
              700: '#116a2c',
              800: '#115426',
              900: '#0e4520',
            },
          },
          animation: {
            'fade-in':  'fadeIn 0.6s ease forwards',
            'slide-up': 'slideUp 0.5s ease forwards',
          },
          keyframes: {
            fadeIn:  { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(16px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        }
      }
    }
  </script>

  <style>
    body {
      background: #0d1a0f;
      font-family: 'Syne', sans-serif;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 128px 128px; opacity: 0.35;
    }

    /* Ambient glow blobs */
    .blob-1 {
      background: radial-gradient(ellipse, rgba(30,168,70,0.18) 0%, transparent 70%);
      position: fixed; top: -10%; left: -10%;
      width: 60vw; height: 60vw; border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .blob-2 {
      background: radial-gradient(ellipse, rgba(13,122,255,0.09) 0%, transparent 70%);
      position: fixed; bottom: -15%; right: -10%;
      width: 55vw; height: 55vw; border-radius: 50%;
      pointer-events: none; z-index: 0;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    @keyframes drift1 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(5%,8%) scale(1.1); } }
    @keyframes drift2 { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-6%,-5%) scale(1.08); } }

    /* Glass card */
    .card {
      background: rgba(13, 26, 14, 0.72);
      border: 1px solid rgba(46, 120, 60, 0.22);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-radius: 20px;
      transition: border-color .3s, box-shadow .3s;
    }
    .card:hover {
      border-color: rgba(62, 192, 99, 0.38);
      box-shadow: 0 0 32px rgba(30, 168, 70, 0.12);
    }

    /* Big metric value */
    .big-value {
      font-family: 'DM Mono', monospace;
      font-size: clamp(2.2rem, 4vw, 3rem);
      font-weight: 500; line-height: 1; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #a8efbe 0%, #3ec063 55%, #77d892 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .big-value.temp-color {
      background: linear-gradient(135deg, #fcd3b4 0%, #f87a38 55%, #fbbf80 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .big-value.hum-color {
      background: linear-gradient(135deg, #bae6fd 0%, #38b2f8 55%, #7dd3fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* Status dot */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
    .connected    { background: #3ec063; box-shadow: 0 0 8px #3ec063; animation: pulse-dot 2s ease infinite; }
    .disconnected { background: #f87171; box-shadow: 0 0 8px #f87171; }
    .connecting   { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 6px #3ec063; }
      50%      { box-shadow: 0 0 14px #3ec063; }
    }

    /* Header shimmer line */
    .shimmer-line {
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(62,192,99,0.6) 40%, rgba(62,192,99,0.6) 60%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 4s ease-in-out infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

    /* Chart canvas */
    .chart-wrapper canvas { width: 100% !important; height: 170px !important; cursor: crosshair; }
    #sensorGrid.charts-expanded { grid-template-columns: 1fr !important; }
    .charts-expanded .chart-wrapper canvas { height: 320px !important; }

    /* Reset zoom button */
    .reset-zoom-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid rgba(248,139,56,0.45);
      background: rgba(248,122,56,0.08);
      color: rgba(248,172,80,0.9);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .reset-zoom-btn:hover {
      background: rgba(248,122,56,0.16);
      border-color: rgba(248,139,56,0.7);
    }

    /* Setpoint input */
    .setpoint-input {
      background: rgba(10, 22, 11, 0.7);
      border: 1px solid rgba(62, 192, 99, 0.28);
      color: #d6f5dd;
      border-radius: 10px;
      padding: 8px 34px 8px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 14px; width: 100px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .setpoint-input:focus {
      border-color: rgba(62, 192, 99, 0.75);
      box-shadow: 0 0 0 3px rgba(62, 192, 99, 0.15);
    }
    .setpoint-input::placeholder { color: rgba(174, 234, 188, 0.3); }

    /* Apply button */
    .apply-btn {
      background: linear-gradient(135deg, #1fa845 0%, #3ec063 100%);
      color: #fff; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase;
      border: none; border-radius: 10px; padding: 9px 18px; cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(30,168,70,0.35);
    }
    .apply-btn:hover  { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(30,168,70,0.48); }
    .apply-btn:active { transform: translateY(0); }

    /* Mini badge */
    .badge {
      font-family: 'DM Mono', monospace; font-size: 10px;
      padding: 2px 8px; border-radius: 6px;
      background: rgba(62, 192, 99, 0.1);
      color: rgba(119, 216, 146, 0.85);
      border: 1px solid rgba(62, 192, 99, 0.18);
    }

    /* Icon pill */
    .icon-pill {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(62, 192, 99, 0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    /* Divider */
    .soft-divider { border: none; border-top: 1px solid rgba(62, 192, 99, 0.1); margin: 16px 0; }

    /* Feedback */
    .feedback-ok  { color: #4ade80; }
    .feedback-err { color: #f87171; }

    /* Datetime range input */
    .datetime-input {
      background: rgba(10, 22, 11, 0.7);
      border: 1px solid rgba(62, 192, 99, 0.28);
      color: #d6f5dd;
      border-radius: 10px;
      padding: 7px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      color-scheme: dark;
    }
    .datetime-input:focus {
      border-color: rgba(62, 192, 99, 0.75);
      box-shadow: 0 0 0 3px rgba(62, 192, 99, 0.15);
    }
    .datetime-input.invalid {
      border-color: rgba(248, 113, 113, 0.7);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.12);
    }

    /* Time filter bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid rgba(62, 192, 99, 0.22);
      background: rgba(13, 26, 14, 0.6);
      color: rgba(174, 234, 188, 0.6);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .filter-btn:hover {
      border-color: rgba(62, 192, 99, 0.5);
      color: #aeeabc;
    }
    .filter-btn.active {
      background: rgba(62, 192, 99, 0.15);
      border-color: rgba(62, 192, 99, 0.65);
      color: #77d892;
    }
    .filter-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(62, 192, 99, 0.5);
      margin-right: 4px;
    }
  </style>
</head>
<body class="min-h-screen relative">

  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="relative z-10 max-w-6xl mx-auto px-5 py-10">

    <!-- Header -->
    <div class="mb-10" style="animation: fadeIn 0.7s ease forwards;">
      <div class="flex items-center justify-between flex-wrap gap-4">
        <div>
          <p class="text-xs font-mono tracking-[0.22em] uppercase mb-1" style="color: rgba(62,192,99,0.65);">
            Sistema de Monitoramento
          </p>
          <h1 class="text-white font-display font-extrabold text-4xl tracking-tight leading-none">
            🌱 Greenhouse
          </h1>
        </div>

        <!-- Status pill -->
        <div class="card flex items-center gap-3 px-4 py-3">
          <span class="status-dot connecting" id="statusDot"></span>
          <span class="text-sm font-mono" style="color: #aeeabc;" id="statusText">Conectando...</span>
          <span class="badge" id="statusTime">—</span>
        </div>
      </div>
      <div class="shimmer-line mt-6"></div>
    </div>

    <!-- Time filter bar -->
    <div class="mb-8 flex items-center justify-between flex-wrap gap-3" style="animation: fadeIn 0.7s ease 0.15s both forwards;">
      <div class="flex items-center gap-4 flex-wrap">
        <span class="filter-label">Período</span>
        <div class="filter-bar" id="filterBar">
          <button class="filter-btn active" data-hours="live">Ao Vivo</button>
          <button class="filter-btn" data-hours="1">1h</button>
          <button class="filter-btn" data-hours="2">2h</button>
          <button class="filter-btn" data-hours="4">4h</button>
          <button class="filter-btn" data-hours="8">8h</button>
          <button class="filter-btn" data-hours="12">12h</button>
          <button class="filter-btn" data-hours="24">24h</button>
          <button class="filter-btn" data-hours="48">48h</button>
          <button class="filter-btn" data-hours="72">72h</button>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <button id="resetZoomBtn" class="reset-zoom-btn" onclick="resetAllZoom()" style="display:none;">↺ Resetar Zoom</button>
        <button id="expandBtn" class="reset-zoom-btn" onclick="toggleExpand()">⤢ Expandir</button>
      </div>
    </div>

    <!-- Date range filter -->
    <div class="mb-8 flex items-center gap-3 flex-wrap" style="animation: fadeIn 0.7s ease 0.2s both forwards;">
      <span class="filter-label">Intervalo</span>
      <input type="datetime-local" id="dateFrom" class="datetime-input" />
      <span class="filter-label" style="margin-right:0;">até</span>
      <input type="datetime-local" id="dateTo" class="datetime-input" />
      <button class="apply-btn" style="font-size:11px;padding:8px 16px;" onclick="applyDateRange()">Filtrar</button>
      <button id="clearRangeBtn" class="reset-zoom-btn" onclick="clearDateRange()" style="display:none;">✕ Limpar</button>
      <span id="rangeFeedback" class="font-mono text-xs feedback-err" style="min-height:16px;"></span>
    </div>

    <!-- Sensor grid -->
    <div id="sensorGrid" class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Temperature -->
      <div class="card p-6" style="animation: slideUp 0.5s ease 0.1s both forwards;">
        <div class="flex items-center justify-between mb-5">
          <div class="flex items-center gap-3">
            <div class="icon-pill">🌡</div>
            <div>
              <p class="text-xs font-mono tracking-widest uppercase" style="color: rgba(62,192,99,0.6);">Temperatura</p>
              <p class="text-sm font-display font-semibold" style="color: #aeeabc;">Ar Ambiente</p>
            </div>
          </div>
          <span class="badge">°C</span>
        </div>

        <div class="big-value temp-color mb-5" id="tempValue">--</div>
        <div class="chart-wrapper"><canvas id="tempChart"></canvas></div>

        <hr class="soft-divider">

        <!-- Air temperature setpoint control -->
        <div>
          <p class="text-xs font-mono tracking-widest uppercase mb-3" style="color: rgba(62,192,99,0.6);">
            Setpoint de Temperatura
          </p>
          <div class="flex items-center gap-3">
            <div class="relative">
              <input
                type="text"
                id="airTemperatureSetpoint"
                class="setpoint-input"
                inputmode="decimal"
                placeholder="0 – 60"
                maxlength="5"
                oninput="handleSetpointInput(this, 'celsiusSymbol')"
                onblur="handleSetpointBlur(this, 'celsiusSymbol')"
                onfocus="handleSetpointFocus(this, 'celsiusSymbol')"
              />
              <span
                id="celsiusSymbol"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-mono pointer-events-none hidden"
                style="color: rgba(174,234,188,0.5);"
              >°C</span>
            </div>
            <button class="apply-btn" onclick="sendAirTemperatureSetpoint()">Aplicar</button>
          </div>
          <p id="airTemperatureSetpointFeedback" class="font-mono text-xs mt-2 transition-all" style="min-height:16px;"></p>
        </div>
      </div>

      <!-- Humidity -->
      <div class="card p-6" style="animation: slideUp 0.5s ease 0.2s both forwards;">
        <div class="flex items-center justify-between mb-5">
          <div class="flex items-center gap-3">
            <div class="icon-pill">💧</div>
            <div>
              <p class="text-xs font-mono tracking-widest uppercase" style="color: rgba(62,192,99,0.6);">Umidade</p>
              <p class="text-sm font-display font-semibold" style="color: #aeeabc;">Ar Ambiente</p>
            </div>
          </div>
          <span class="badge">%</span>
        </div>

        <div class="big-value hum-color mb-5" id="humValue">--</div>
        <div class="chart-wrapper"><canvas id="humChart"></canvas></div>
      </div>

      <!-- Soil Moisture -->
      <div class="card p-6" style="animation: slideUp 0.5s ease 0.3s both forwards;">
        <div class="flex items-center justify-between mb-5">
          <div class="flex items-center gap-3">
            <div class="icon-pill">🌿</div>
            <div>
              <p class="text-xs font-mono tracking-widest uppercase" style="color: rgba(62,192,99,0.6);">Umidade</p>
              <p class="text-sm font-display font-semibold" style="color: #aeeabc;">Solo</p>
            </div>
          </div>
          <span class="badge">%</span>
        </div>

        <div class="big-value mb-5" id="soilValue">--</div>
        <div class="chart-wrapper"><canvas id="soilChart"></canvas></div>

        <hr class="soft-divider">

        <!-- Setpoint control -->
        <div>
          <p class="text-xs font-mono tracking-widest uppercase mb-3" style="color: rgba(62,192,99,0.6);">
            Setpoint de Irrigação
          </p>
          <div class="flex items-center gap-3">
            <div class="relative">
              <input
                type="text"
                id="soilSetpoint"
                class="setpoint-input"
                inputmode="decimal"
                placeholder="0 – 100"
                value="70"
                maxlength="6"
                oninput="handleSetpointInput(this, 'pctSymbol')"
                onblur="handleSetpointBlur(this, 'pctSymbol')"
                onfocus="handleSetpointFocus(this, 'pctSymbol')"
              />
              <span
                id="pctSymbol"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-sm font-mono pointer-events-none hidden"
                style="color: rgba(174,234,188,0.5);"
              >%</span>
            </div>
            <button class="apply-btn" onclick="sendSoilSetpoint()">Aplicar</button>
          </div>
          <p id="soilSetpointFeedback" class="font-mono text-xs mt-2 transition-all" style="min-height:16px;"></p>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center font-mono text-xs mt-10 tracking-[0.18em]" style="color: rgba(62,192,99,0.28);">
      GREENHOUSE MONITORING SYSTEM · v2.0
    </p>
  </div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const API_BASE = 'http://localhost:3000';
  let activeHours = null; // null = live mode (no historical filter)
  let activeRange = null; // { from: Date, to: Date } or null

  // ── Socket.IO ──────────────────────────────────────────────────────────────
  const client = io(API_BASE);

  client.on('connect', () => {
    setStatus('connected', 'Conectado ✅');
    loadSetpointConfig();
  });
  client.on('reconnecting', () => setStatus('connecting',   'Reconectando…'));
  client.on('disconnect',   () => setStatus('disconnected', 'Desconectado ❌'));
  client.on('error',        () => setStatus('disconnected', 'Erro de Conexão ❌'));

  client.on('sensor-update', ({ air, soil }) => {
    if (activeHours !== null || activeRange !== null) return; // filter active — values and charts frozen

    if (air) {
      setValue('tempValue', air.temperature, '°C');
      setValue('humValue',  air.humidity,    '%');
    }
    if (soil) {
      setValue('soilValue', soil.humidity, '%');
    }

    const now = Date.now();
    const pt  = new Date(now);
    const maxAge = now - 3600000;

    tempChart.data.datasets[0].data.push({ x: pt, y: air?.temperature ?? null });
    humChart.data.datasets[0].data.push({ x: pt, y: air?.humidity    ?? null });
    soilChart.data.datasets[0].data.push({ x: pt, y: soil?.humidity  ?? null });

    [tempChart, humChart, soilChart].forEach(c => {
      const data = c.data.datasets[0].data;
      while (data.length > 0 && data[0].x < maxAge) data.shift();
      c.update('none');
    });
  });

  function setStatus(state, text) {
    const dot  = document.getElementById('statusDot');
    const span = document.getElementById('statusText');
    const time = document.getElementById('statusTime');
    dot.className = 'status-dot ' + state;
    span.textContent = text;
    time.textContent = new Date().toLocaleTimeString('pt-BR');
  }

  function setValue(id, val, unit) {
    document.getElementById(id).textContent = val != null ? Number(val).toFixed(1) + unit : '--';
  }

  // ── Charts ─────────────────────────────────────────────────────────────────
  Chart.defaults.color = 'rgba(174,234,188,0.5)';
  Chart.defaults.borderColor = 'rgba(62,192,99,0.07)';

  function createChart(id, label, lineColor, gradientStart) {
    return new Chart(document.getElementById(id), {
      type: 'line',
      data: {
        datasets: [{
          label,
          data: [],
          tension: 0.42,
          borderColor: lineColor,
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: lineColor,
          fill: true,
          backgroundColor: (ctx) => {
            const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 170);
            g.addColorStop(0, gradientStart);
            g.addColorStop(1, 'rgba(0,0,0,0)');
            return g;
          }
        }]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(10,22,11,0.9)',
            borderColor: 'rgba(62,192,99,0.25)',
            borderWidth: 1,
            titleFont: { family: 'DM Mono', size: 11 },
            bodyFont:  { family: 'DM Mono', size: 13 },
            titleColor: 'rgba(174,234,188,0.6)',
            bodyColor: '#aeeabc',
            padding: 10,
            callbacks: {
              title: (items) => {
                if (!items.length) return '';
                const d = new Date(items[0].parsed.x);
                if (activeHours <= 4)
                  return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' })
                  + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
              }
            }
          },
          zoom: {
            zoom: {
              drag: {
                enabled: true,
                backgroundColor: 'rgba(62,192,99,0.08)',
                borderColor: 'rgba(62,192,99,0.4)',
                borderWidth: 1,
              },
              mode: 'x',
              onZoomComplete({ chart }) { syncZoom(chart); }
            }
          }
        },
        scales: {
          x: {
            type: 'time',
            display: true,
            time: {
              displayFormats: {
                minute: 'HH:mm',
                hour: 'dd/MM HH:mm',
                day: 'dd/MM',
              }
            },
            grid: { color: 'rgba(62,192,99,0.06)' },
            ticks: {
              font: { family: 'DM Mono', size: 10 },
              color: 'rgba(174,234,188,0.4)',
              maxTicksLimit: 6,
              maxRotation: 0,
            }
          },
          y: {
            grid: { color: 'rgba(62,192,99,0.06)' },
            beginAtZero: false,
            ticks: {
              font: { family: 'DM Mono', size: 10 },
              color: 'rgba(174,234,188,0.4)',
              maxTicksLimit: 4,
            }
          }
        }
      }
    });
  }

  const tempChart = createChart('tempChart', 'Temperatura', '#f87a38', 'rgba(248,122,56,0.22)');
  const humChart  = createChart('humChart',  'Umidade Ar',  '#38b2f8', 'rgba(56,178,248,0.18)');
  const soilChart = createChart('soilChart', 'Solo',        '#3ec063', 'rgba(62,192,99,0.2)');

  function setChartData(chart, points) {
    chart.data.datasets[0].data = points;
    chart.update('none');
  }

  function upsertBucket(chart, bucketDate, value) {
    const data = chart.data.datasets[0].data;
    if (data.length > 0 && data[data.length - 1].x.getTime() === bucketDate.getTime()) {
      data[data.length - 1].y = value;
    } else {
      data.push({ x: bucketDate, y: value });
    }
  }

  // ── Zoom ──────────────────────────────────────────────────────────────────
  function syncZoom(sourceChart) {
    const { min, max } = sourceChart.scales.x;
    [tempChart, humChart, soilChart].forEach(c => {
      if (c === sourceChart) return;
      c.zoomScale('x', { min, max }, 'none');
    });
    document.getElementById('resetZoomBtn').style.display = '';
  }

  function resetAllZoom() {
    [tempChart, humChart, soilChart].forEach(c => c.resetZoom());
    document.getElementById('resetZoomBtn').style.display = 'none';
  }

  // ── Historical data ────────────────────────────────────────────────────────
  let loadingController = null;

  async function loadHistoricalData(hours) {
    resetAllZoom();
    if (loadingController) loadingController.abort();
    loadingController = new AbortController();

    setChartData(tempChart, []);
    setChartData(humChart,  []);
    setChartData(soilChart, []);

    try {
      const res = await fetch(`${API_BASE}/sensor-data/history?hours=${hours}`,
        { signal: loadingController.signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { points, average } = await res.json();

      const tempData = [], humData = [], soilData = [];
      for (const point of points) {
        const ts = new Date(point.timestamp);
        tempData.push({ x: ts, y: point.air?.temperature ?? null });
        humData.push({ x: ts, y: point.air?.humidity    ?? null });
        soilData.push({ x: ts, y: point.soil?.humidity  ?? null });
      }

      setChartData(tempChart, tempData);
      setChartData(humChart,  humData);
      setChartData(soilChart, soilData);

      const baseMin = Date.now() - hours * 3600000;
      [tempChart, humChart, soilChart].forEach(c => {
        c.options.scales.x.min = baseMin;
        c.options.scales.x.max = undefined;
        c.update('none');
      });

      setValue('tempValue', average.air.temperature, '°C');
      setValue('humValue',  average.air.humidity,    '%');
      setValue('soilValue', average.soil.humidity,   '%');
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error('Failed to load historical data:', err);
    }
  }

  // ── Filter bar ─────────────────────────────────────────────────────────────
  document.getElementById('filterBar').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    clearRangeState();

    if (btn.dataset.hours === 'live') {
      activeHours = null;
      if (loadingController) { loadingController.abort(); loadingController = null; }
      setChartData(tempChart, []);
      setChartData(humChart,  []);
      setChartData(soilChart, []);
      [tempChart, humChart, soilChart].forEach(c => {
        c.options.scales.x.min = undefined;
        c.update('none');
      });
    } else {
      activeHours = parseInt(btn.dataset.hours, 10);
      loadHistoricalData(activeHours);
    }
  });

  // Live mode: x.min is managed per-event; no initial load needed

  // ── Setpoint ───────────────────────────────────────────────────────────────
  function setSymbolVisible(symbolId, show) {
    const sym = document.getElementById(symbolId);
    sym.classList.toggle('hidden', !show);
    sym.classList.toggle('inline-block', show);
  }

  function handleSetpointInput(el, symbolId) {
    el.value = el.value.replace(/[^0-9.,]/g, '');
    const sepIdx = el.value.search(/[.,]/);
    if (sepIdx !== -1) {
      const intPart = el.value.slice(0, sepIdx + 1);
      const decPart = el.value.slice(sepIdx + 1).replace(/[.,]/g, '').slice(0, 2);
      el.value = intPart + decPart;
    }
    setSymbolVisible(symbolId, el.value.length > 0);
  }

  function handleSetpointBlur(el, symbolId) {
    el.value = el.value.replace('.', ',');
    setSymbolVisible(symbolId, el.value.length > 0);
  }

  function handleSetpointFocus(el, symbolId) {
    setSymbolVisible(symbolId, el.value.length > 0);
  }

  async function loadSetpointConfig() {
    try {
      const res  = await fetch(`${API_BASE}/setpoint-config`);
      const data = res.ok ? await res.json() : { soilSetpoint: 70, airTemperatureSetpoint: null };

      const soilInput = document.getElementById('soilSetpoint');
      soilInput.value = String(data.soilSetpoint ?? 70).replace('.', ',');
      setSymbolVisible('pctSymbol', soilInput.value.length > 0);

      const airInput = document.getElementById('airTemperatureSetpoint');
      if (data.airTemperatureSetpoint != null) {
        airInput.value = String(data.airTemperatureSetpoint).replace('.', ',');
        setSymbolVisible('celsiusSymbol', true);
      }
    } catch {
      // silently fall back — inputs keep their default values
    }
  }

  function sendSoilSetpoint() {
    const input = document.getElementById('soilSetpoint');
    const raw   = input.value.trim();

    if (!raw) { showFeedback('soilSetpointFeedback', '⚠️ Insira um valor para o setpoint.', false); return; }

    const normalized = raw.replace(',', '.');
    let value = parseFloat(normalized);

    if (isNaN(value)) { showFeedback('soilSetpointFeedback', '⚠️ Valor inválido. Use apenas números.', false); return; }

    let clamped = false;
    if (value > 100) { value = 100; clamped = true; }
    if (value < 0)   { value = 0;   clamped = true; }

    if (clamped) input.value = String(value).replace('.', ',');

    client.emit('setpoint-config', { soilSetpoint: value });

    const display = String(value).replace('.', ',');
    const note    = clamped ? ' (ajustado automaticamente)' : '';
    showFeedback('soilSetpointFeedback', `✅ Setpoint enviado: ${display}%${note}`, true);
  }

  function sendAirTemperatureSetpoint() {
    const input = document.getElementById('airTemperatureSetpoint');
    const raw   = input.value.trim();

    if (!raw) { showFeedback('airTemperatureSetpointFeedback', '⚠️ Insira um valor para o setpoint.', false); return; }

    const normalized = raw.replace(',', '.');
    let value = parseFloat(normalized);

    if (isNaN(value)) { showFeedback('airTemperatureSetpointFeedback', '⚠️ Valor inválido. Use apenas números.', false); return; }

    let clamped = false;
    if (value > 60) { value = 60; clamped = true; }
    if (value < 0)  { value = 0;  clamped = true; }

    if (clamped) input.value = String(value).replace('.', ',');

    client.emit('setpoint-config', { airTemperatureSetpoint: value });

    const display = String(value).replace('.', ',');
    const note    = clamped ? ' (ajustado automaticamente)' : '';
    showFeedback('airTemperatureSetpointFeedback', `✅ Setpoint enviado: ${display}°C${note}`, true);
  }

  // ── Date range filter ──────────────────────────────────────────────────────
  function setRangeFeedback(msg) {
    const el = document.getElementById('rangeFeedback');
    el.textContent = msg;
    clearTimeout(el._t);
    if (msg) el._t = setTimeout(() => { el.textContent = ''; }, 4000);
  }

  function clearRangeState() {
    activeRange = null;
    document.getElementById('clearRangeBtn').style.display = 'none';
    setRangeFeedback('');
  }

  function clearDateRange() {
    clearRangeState();
    document.getElementById('dateFrom').value = '';
    document.getElementById('dateTo').value   = '';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-hours="live"]').classList.add('active');
    activeHours = null;
    if (loadingController) { loadingController.abort(); loadingController = null; }
    setChartData(tempChart, []);
    setChartData(humChart,  []);
    setChartData(soilChart, []);
    [tempChart, humChart, soilChart].forEach(c => {
      c.options.scales.x.min = undefined;
      c.options.scales.x.max = undefined;
      c.update('none');
    });
  }

  async function applyDateRange() {
    const fromVal = document.getElementById('dateFrom').value;
    const toVal   = document.getElementById('dateTo').value;

    document.getElementById('dateFrom').classList.remove('invalid');
    document.getElementById('dateTo').classList.remove('invalid');

    if (!fromVal) { document.getElementById('dateFrom').classList.add('invalid'); }
    if (!toVal)   { document.getElementById('dateTo').classList.add('invalid');   }
    if (!fromVal || !toVal) {
      setRangeFeedback('Preencha as duas datas para filtrar.');
      return;
    }

    const from = new Date(fromVal);
    const to   = new Date(toVal);
    if (from >= to) {
      setRangeFeedback('A data inicial deve ser anterior à data final.');
      document.getElementById('dateFrom').classList.add('invalid');
      document.getElementById('dateTo').classList.add('invalid');
      return;
    }

    setRangeFeedback('');
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    activeHours = null;
    activeRange = { from, to };

    resetAllZoom();
    if (loadingController) loadingController.abort();
    loadingController = new AbortController();

    setChartData(tempChart, []);
    setChartData(humChart,  []);
    setChartData(soilChart, []);

    try {
      const url = `${API_BASE}/sensor-data/history/range?from=${from.toISOString()}&to=${to.toISOString()}`;
      const res = await fetch(url, { signal: loadingController.signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { points, average } = await res.json();

      const tempData = [], humData = [], soilData = [];
      for (const point of points) {
        const ts = new Date(point.timestamp);
        tempData.push({ x: ts, y: point.air?.temperature ?? null });
        humData.push({ x: ts, y: point.air?.humidity    ?? null });
        soilData.push({ x: ts, y: point.soil?.humidity  ?? null });
      }

      setChartData(tempChart, tempData);
      setChartData(humChart,  humData);
      setChartData(soilChart, soilData);

      [tempChart, humChart, soilChart].forEach(c => {
        c.options.scales.x.min = from.getTime();
        c.options.scales.x.max = to.getTime();
        c.update('none');
      });

      setValue('tempValue', average.air.temperature, '°C');
      setValue('humValue',  average.air.humidity,    '%');
      setValue('soilValue', average.soil.humidity,   '%');

      document.getElementById('clearRangeBtn').style.display = '';
    } catch (err) {
      if (err.name === 'AbortError') return;
      activeRange = null;
      setRangeFeedback('Erro ao carregar dados do intervalo.');
      console.error('Failed to load range data:', err);
    }
  }

  function toggleExpand() {
    const grid = document.getElementById('sensorGrid');
    const btn  = document.getElementById('expandBtn');
    const expanded = grid.classList.toggle('charts-expanded');
    btn.textContent = expanded ? '⤡ Recolher' : '⤢ Expandir';
    [tempChart, humChart, soilChart].forEach(c => c.resize());
  }

  function showFeedback(feedbackId, msg, ok) {
    const el = document.getElementById(feedbackId);
    el.className = 'font-mono text-xs mt-2 transition-all ' + (ok ? 'feedback-ok' : 'feedback-err');
    el.textContent = msg;
    clearTimeout(el._t);
    el._t = setTimeout(() => { el.textContent = ''; }, 4000);
  }
</script>
</body>
</html>
